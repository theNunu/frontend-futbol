<app-create-or-edit #formModal (tournamentCreated)="getAllTournaments()"></app-create-or-edit>
<i class="fa-solid fa-circle-plus" style="color: rgb(14, 154, 10);"></i>
<button (click)="formModal.openModalCreate()" class="btn btn-success p-2 mt-5">Nuevo Torneo</button>
<!-- <i class="fa-solid fa-house fa-4x"></i> 
<i class="fa-solid fa-pen-to-square fa-2x" style="color: rgb(218, 231, 83);"></i>
<i class="fa-solid fa-eye fa-2x" style="color: rgb(53, 116, 205);"></i>
<i class="fa-solid fa-trash fa-2x" style="color: rgb(205, 53, 53);"></i> -->
<div class="d-flex justify-content-center w-100 mt-4">
    <div>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th scope="col">tournament_id</th>
                    <th scope="col">Name</th>
                    <th scope="col">Season</th>
                    <th scope="col" class="text-center">acciones</th>
                </tr>
            </thead>
            <tbody>
                @for (item of list; track $index) {
                <tr>
                    <th scope="row">{{ item.tournament_id }}</th>
                    <td>{{ item.name }}</td>
                    <td>{{ item.season }}</td>
                    <td>
                        <div class="d-flex flex gap-3">
                            <i class="fa-solid fa-eye fa-1x" style="color: rgb(53, 116, 205);" title="Más información"
                                (click)="openProduct( item.tournament_id)"></i>

                            <i class="fa-solid fa-pen-to-square fa-1x" style="color: rgb(218, 231, 83);"
                                title="EditarTorneo" (click)="formModal.openModalEdit(item)"></i>

                            <i class="fa-solid fa-trash fa-1x" style="color: rgb(205, 53, 53);" title="Eliminar torneo"
                                (click)="deleteTournament(item.tournament_id)"></i>
                        </div>
                    </td>
                </tr>
                }
            </tbody>
        </table>

    </div>


</div>

<!--modal show por id-->


<div *ngIf="showModal"
    style="background-color: rgba(0,0,0,0.6);position: fixed;top:0;left:0;width:100%;height:100%;display:flex;justify-content:center;align-items:center;"
    (click)="closeModal()">

    <div class="bg-white p-4 rounded text-center" style="width:500px">

        <div *ngIf="selectedProduct">

            <h2 class="fs-4">{{selectedProduct.name}}</h2>
            <!-- <img [src]="selectedProduct.image" class="mt-3" style="width:200px; height:200px"> -->
            <div class="border p-4 rounded mt-3 text-center" style="max-height: 200px; overflow-y: auto;">
                <!--el scroll solo se activa si pasa los max-height-->

                <div class="text-secondary">{{selectedProduct.season}}</div>
            </div>

        </div>

    </div>

</div>
