<p>tournaments works!</p>

<button class="btn btn-success text-white">
    crear torneo
</button>

<button (click)="openModalCreate( )">
    crear torneo
</button>
<div class="container">
   

    <div *ngIf="showModalCreate">

        <div style="background-color: rgba(0,0,0,0.6);position: fixed;top:0;left:0;width:100%;height:100%;display:flex;justify-content:center;align-items:center;"
            (click)="closeModalCreate()">
            <div class="bg-white p-4 rounded text-center" style="width:500px" (click)="$event.stopPropagation()">
                <form [formGroup]="tournamentForm" (ngSubmit)="saveTournament()">
                    <h2 >Crear Nuevo Torneo</h2>
                    <div class="d-flex flex-column gap-3 p-3">
                        <label for="name" class="me-auto">Nombre del Torneo:</label>
                        <input id="name" type="text" formControlName="name" placeholder="Torneo Iran en Medio Oriente" class="form-control">
                        <label for="season" class="me-auto">Temporada:</label>     <!-- Se alinean a la derecha -->
                        <input id="season" type="text" formControlName="season" placeholder="Temporada 2026" class="form-control">

                    </div>

                    <button class="btn btn-success mt-3 w-100"  (click)="closeModalCreate()">
                        Guaradar Torneo
                    </button>

                </form>
            </div>
        </div>

    </div>

</div>

<div class="d-flex justify-content-center w-100">
    <div>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th scope="col">tournament_id</th>
                    <th scope="col">Name</th>
                    <th scope="col">Season</th>
                    <th scope="col">acciones</th>
                </tr>
            </thead>
            <tbody>
                @for (item of list; track $index) {
                <tr>
                    <th scope="row">{{ item.tournament_id }}</th>
                    <td>{{ item.name }}</td>
                    <td>{{ item.season }}</td>
                    <td>
                        <div class="d-flex flex gap-3">
                            <button class="btn btn-warning text-white">
                                actualizar torneo
                            </button>
                            <button class="btn btn-info text-white">
                                ver mas
                            </button>
                            <button (click)="openProduct( item.tournament_id)">
                                Ver producto
                            </button>

                            <button class="btn btn-danger text-white">
                                inactivar torneo
                            </button>
                        </div>
                    </td>
                </tr>
                }
            </tbody>
        </table>

    </div>


</div>

<!--modal show por id-->


<div *ngIf="showModal"
    style="background-color: rgba(0,0,0,0.6);position: fixed;top:0;left:0;width:100%;height:100%;display:flex;justify-content:center;align-items:center;"
    (click)="closeModal()">

    <div class="bg-white p-4 rounded text-center" style="width:500px">

        <div *ngIf="selectedProduct">

            <h2 class="fs-4">{{selectedProduct.name}}</h2>
            <!-- <img [src]="selectedProduct.image" class="mt-3" style="width:200px; height:200px"> -->
            <div class="border p-4 rounded mt-3 text-center" style="max-height: 200px; overflow-y: auto;">
                <!--el scroll solo se activa si pasa los max-height-->

                <div class="text-secondary">{{selectedProduct.season}}</div>
            </div>

        </div>

    </div>

</div>
